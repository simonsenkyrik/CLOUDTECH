<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nabízíme cloudové služby pro střední a velké podniky">
    <title>Úvod | CLOUDTECH</title>
    <link rel="stylesheet" href="assets/styles/style.css">
</head>
<body>
<header class="header">
    <nav class="navigation-container">
        <div class="header-left">
            <a href="index.html">
                <img class="header-logo" src="assets/images/cloudtech-logo.png" alt="cloudtech logo">
            </a>    
        </div>
        <div class="hamburger-icon">
            <button class="toggle-button">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </div> 
        <div class="header-right">
            <ul class="navigation-menu">
                <li class="nav-btn" id="first-nav-btn"><a class="nav-li" href="index.html">Domů</a></li>
                <li class="nav-btn"><a class="nav-li" href="sluzby.html" >Služby</a></li>
                <li class="nav-btn"><a class="nav-li" href="o-nas.html">O nás</a></li>
                <li class="nav-btn"><a class="nav-li" href="kontakt.html">Kontakt</a></li>
            </ul>
            <div class="centered-buttons">
                <button id="openLogIn" class="but-log-in">Přihlášení</button>
                <button id="openSignUp" class="but-sign-up">Registrace</button>
            </div>
        </div>
    </nav>
</header>
<section class="main-modal">
<div class="modal" id="modal">
    <div class="but-modal-window">
        <div class="modal-header">
            <img class="modal-header-logo" src="assets/images/cloudtech-logo.png" alt="cloudtech logo">
            <button class="close-btn">✕</button>
        </div>
        <div class="modal-tabs">
            <button class="tab" data-tab="login">Přihlášení</button>
            <button class="tab" data-tab="sign-up">Registrace</button>
        </div>
        <form class="LogInForm" id="log-in-form">
            <label class="LaModal">Email nebo Uživatelské jméno</label>
            <input type="text" id="login-identifier" class="log-in-input" placeholder="Zadejte email nebo uživatelské jméno" required>
            <label class="LaModal">Heslo</label>
            <input type="password" id="login-password" class="log-in-input" placeholder="Zadejte heslo" required="">
            <button type="submit" class="log-in-sub-btn">Přihlásit se</button>
            <div class="divider">
                <span>nebo pokračovat pomocí</span>
            </div>

            <div class="socials-log-in">
                <button type="button" class="soc-btn google-btn">Google</button>
                <button type="button" class="soc-btn apple">Apple</button>
            </div>
        </form>
        <form class="SignUpForm" id="sign-up-form">
            <label class="LaModal">Email</label>
            <input type="email" id="signup-email" class="sign-up-input" placeholder="Zadejte Email" required="">
            <label class="LaModal">Datum narození</label>
            <input type="date" id="signup-date" class="sign-up-input" required="">
            <label class="LaModal">Username</label>
            <input type="text" id="signup-username" class="sign-up-input" required="">
            <label class="LaModal">Heslo</label>
            <input type="password" id="signup-password" class="sign-up-input" placeholder="Zadejte heslo" required="">
            <button type="submit" class="sign-up-sub-btn">Registrovat se</button>

            <div class="divider">
                <span>nebo pokračovat pomocí</span>
            </div>

            <div class="socials-sign-up">
                <button type="button" class="soc-btn google-btn">Google</button>
                <button type="button" class="soc-btn apple">Apple</button>
            </div>

            <p class="terms">
                Registrací souhlasíte s Podmínkami použití a 
            </p>

        </form>

    </div>
</div>
</section>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="text/javascript" src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js"></script>
<script src="assets/script/script.js"></script>
</body>
</html>
